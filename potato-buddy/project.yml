name: PotatoBuddy
options:
  bundleIdPrefix: com.youngryul
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

schemes:
  PotatoClock:
    build:
      targets:
        PotatoClock: all
    run:
      config: Debug
    archive:
      config: Release

  PotatoBuddyiOS:
    build:
      targets:
        PotatoBuddyiOS: all
    run:
      config: Debug
    archive:
      config: Release

targets:
  PotatoBuddy:
    type: application
    platform: macOS
    sources:
      - path: PotatoBuddy
      - path: Shared
        excludes:
          - WidgetScheduleStore.swift
    resources:
      - path: PotatoBuddy/Assets.xcassets
      - path: PotatoBuddy/물 주는 포실이.gif
      - path: PotatoBuddy/포실이(투명).png
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.youngryul.potatobuddy
    info:
      path: PotatoBuddy/Info.plist
      properties:
        CFBundleDisplayName: 포실이
        CFBundleIconFile: AppIcon
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSPrincipalClass: NSApplication
        LSMinimumSystemVersion: "14.0"
        LSUIElement: false
        CFBundleURLTypes:
          - CFBundleURLName: com.youngryul.potatobuddy
            CFBundleURLSchemes:
              - potatobuddy
    entitlements:
      path: PotatoBuddy/PotatoBuddy.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true

  PotatoBuddyiOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PotatoBuddyiOS
        excludes:
          - toeicNorangiVocab.json
      - path: Shared
    resources:
      - path: PotatoBuddyiOS/모바일배경.png
      - path: PotatoBuddyiOS/포실이(투명).png
      - path: PotatoBuddyiOS/포실이뽀모도로.png
      - path: PotatoBuddyiOS/타이머.png
      - path: PotatoBuddyiOS/summer.png
      - path: PotatoBuddyiOS/toeicNorangiVocab.json
      - path: PotatoBuddyiOS/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.youngryul.potatobuddy.ios
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        CODE_SIGN_ENTITLEMENTS: PotatoBuddyiOS/PotatoBuddyiOS.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: PotatoBuddyiOS/Info.plist
      properties:
        CFBundleDisplayName: 포실이
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        CFBundleURLTypes:
          - CFBundleURLName: com.youngryul.potatobuddy.ios
            CFBundleURLSchemes:
              - potatobuddy
        NSMotionUsageDescription: 오늘 걸음 수를 만보기처럼 확인하기 위해 동작 및 피트니스 데이터가 필요합니다.
    entitlements:
      path: PotatoBuddyiOS/PotatoBuddyiOS.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.youngryul.potatobuddy.ios
    dependencies:
      - target: ScheduleWidgetExtension
        embed: true

  PotatoClock:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: PotatoClock
    resources:
      - path: PotatoBuddyiOS/summer.png
      - path: PotatoBuddyiOS/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.youngryul.potatoclock
        IPHONEOS_DEPLOYMENT_TARGET: "15.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "2"
    info:
      path: PotatoClock/Info.plist
      properties:
        CFBundleDisplayName: 포실이 시계
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

  ScheduleWidgetExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ScheduleWidget
      - path: Shared/WidgetScheduleStore.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.youngryul.potatobuddy.ios.schedulewidget
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        CODE_SIGN_ENTITLEMENTS: ScheduleWidget/ScheduleWidget.entitlements
    info:
      path: ScheduleWidget/Info.plist
      properties:
        CFBundleDisplayName: 오늘 일정
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: ScheduleWidget/ScheduleWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.youngryul.potatobuddy.ios
