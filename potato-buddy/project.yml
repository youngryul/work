name: PotatoBuddy
options:
  bundleIdPrefix: com.youngryul
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  PotatoBuddy:
    type: application
    platform: macOS
    sources:
      - path: PotatoBuddy
      - path: Shared
        excludes:
          - WidgetScheduleStore.swift
    resources:
      - path: PotatoBuddy/Assets.xcassets
      - path: PotatoBuddy/물 주는 포실이.gif
      - path: PotatoBuddy/포실이(투명).png
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.youngryul.potatobuddy
    info:
      path: PotatoBuddy/Info.plist
      properties:
        CFBundleDisplayName: 포실이
        CFBundleIconFile: AppIcon
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSPrincipalClass: NSApplication
        LSMinimumSystemVersion: "14.0"
        LSUIElement: false
        CFBundleURLTypes:
          - CFBundleURLName: com.youngryul.potatobuddy
            CFBundleURLSchemes:
              - potatobuddy
    entitlements:
      path: PotatoBuddy/PotatoBuddy.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true

  PotatoBuddyiOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PotatoBuddyiOS
      - path: Shared
    resources:
      - path: PotatoBuddyiOS/모바일배경.png
      - path: PotatoBuddyiOS/포실이(투명).png
      - path: PotatoBuddyiOS/포실이뽀모도로.png
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.youngryul.potatobuddy.ios
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        CODE_SIGN_ENTITLEMENTS: PotatoBuddyiOS/PotatoBuddyiOS.entitlements
    info:
      path: PotatoBuddyiOS/Info.plist
      properties:
        CFBundleDisplayName: 포실이
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        CFBundleURLTypes:
          - CFBundleURLName: com.youngryul.potatobuddy.ios
            CFBundleURLSchemes:
              - potatobuddy
    entitlements:
      path: PotatoBuddyiOS/PotatoBuddyiOS.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.youngryul.potatobuddy.ios
    dependencies:
      - target: ScheduleWidgetExtension
        embed: true

  ScheduleWidgetExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ScheduleWidget
      - path: Shared/WidgetScheduleStore.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.youngryul.potatobuddy.ios.schedulewidget
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        CODE_SIGN_ENTITLEMENTS: ScheduleWidget/ScheduleWidget.entitlements
    info:
      path: ScheduleWidget/Info.plist
      properties:
        CFBundleDisplayName: 오늘 일정
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: ScheduleWidget/ScheduleWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.youngryul.potatobuddy.ios
