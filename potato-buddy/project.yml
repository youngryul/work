name: PotatoBuddy
options:
  bundleIdPrefix: com.youngryul
  deploymentTarget:
    macOS: "14.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  PotatoBuddy:
    type: application
    platform: macOS
    sources:
      - path: PotatoBuddy
      - path: Shared
    resources:
      - path: PotatoBuddy/Assets.xcassets
      - path: PotatoBuddy/물 주는 포실이.gif
      - path: PotatoBuddy/포실이(투명).png
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.youngryul.potatobuddy
    info:
      path: PotatoBuddy/Info.plist
      properties:
        CFBundleDisplayName: 포실이
        CFBundleIconFile: AppIcon
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSPrincipalClass: NSApplication
        LSMinimumSystemVersion: "14.0"
        LSUIElement: false
        CFBundleURLTypes:
          - CFBundleURLName: com.youngryul.potatobuddy
            CFBundleURLSchemes:
              - potatobuddy
    entitlements:
      path: PotatoBuddy/PotatoBuddy.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
